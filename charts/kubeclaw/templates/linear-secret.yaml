{{- /*
Create an Opaque Secret holding the Linear API key when:
  - linear.enabled is true
  - linear.auth.token is non-empty (inline token provided)
  - linear.auth.tokenSecretName is empty (no existing Secret referenced)
*/ -}}
{{- if and .Values.linear.enabled .Values.linear.auth.token (not .Values.linear.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.linearAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.linearAuthSecretKey" . }}: {{ .Values.linear.auth.token | b64enc | quote }}
{{- end }}
