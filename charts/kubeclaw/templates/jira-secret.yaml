{{- /*
Create an Opaque Secret holding the JIRA API token when:
  - jira.enabled is true
  - jira.auth.token is non-empty (inline token provided)
  - jira.auth.tokenSecretName is empty (no existing Secret referenced)
*/ -}}
{{- if and .Values.jira.enabled .Values.jira.auth.token (not .Values.jira.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.jiraAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.jiraAuthSecretKey" . }}: {{ .Values.jira.auth.token | b64enc | quote }}
{{- end }}
