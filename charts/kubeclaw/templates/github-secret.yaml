{{- /*
Create an Opaque Secret holding the GitHub token when:
  - github.enabled is true
  - github.auth.token is non-empty (inline token provided)
  - github.auth.tokenSecretName is empty (no existing Secret referenced)

When tokenSecretName is set, this template is skipped to avoid conflicts.
*/ -}}
{{- if and .Values.github.enabled .Values.github.auth.token (not .Values.github.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.githubAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.githubAuthSecretKey" . }}: {{ .Values.github.auth.token | b64enc | quote }}
{{- end }}
