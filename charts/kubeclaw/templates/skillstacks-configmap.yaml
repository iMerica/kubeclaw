{{- if .Values.skillStacks.enabled }}
{{- /*
  Domain mapping: directory name -> values key.
  Each entry is checked for .enabled and its SKILL.md files are bundled.
*/ -}}
{{- $domains := dict
    "platform-engineering" .Values.skillStacks.platformEngineering
    "devops" .Values.skillStacks.devops
    "sre" .Values.skillStacks.sre
    "swe" .Values.skillStacks.swe
    "qa" .Values.skillStacks.qa
    "marketing" .Values.skillStacks.marketing
}}
{{- /*
  Per-domain ConfigMaps: each bundles the SKILL.md files for that domain.
  Only rendered when the domain is enabled and has files.
*/ -}}
{{- range $domain, $cfg := $domains }}
{{- if $cfg.enabled }}
{{- $files := $.Files.Glob (printf "skillstacks/%s/*/SKILL.md" $domain) }}
{{- if $files }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.fullname" $ }}-skillstack-{{ $domain }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" $ | nindent 4 }}
data:
  {{- range $path, $_ := $files }}
  {{- $parts := splitList "/" $path }}
  {{- $skillName := index $parts (sub (len $parts) 2) }}
  {{ $skillName }}.md: |
    {{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
---
# ConfigMap: SkillStacks configuration and install script.
# The skillstacks-init initContainer copies bundled SKILL.md files and merges
# skills.json into openclaw.json before the Gateway starts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.skillStacksConfigmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
data:
  skills.json: |
    {
      "skills": {
        "load": {
          "watch": {{ .Values.skillStacks.watch }},
          "extraDirs": {{ if .Values.obsidian.enabled }}{{ append .Values.skillStacks.extraDirs "/vaults" | toJson }}{{ else }}{{ .Values.skillStacks.extraDirs | toJson }}{{ end }}
        },
        "install": {
          "nodeManager": {{ .Values.skillStacks.nodeManager | quote }}
        },
        "entries": {
          {{- $first := true }}
          {{- range $domain, $cfg := $domains }}
          {{- if $cfg.enabled }}
          {{- $files := $.Files.Glob (printf "skillstacks/%s/*/SKILL.md" $domain) }}
          {{- range $path, $_ := $files }}
          {{- $parts := splitList "/" $path }}
          {{- $skillName := index $parts (sub (len $parts) 2) }}
          {{- if not $first }},{{ end }}
          {{ $skillName | quote }}: {
            "enabled": true
          }
          {{- $first = false }}
          {{- end }}
          {{- end }}
          {{- end }}
        }
      }
    }

  install.sh: |
    #!/bin/sh
    set -eu

    SKILLS_DIR=/data/skills
    SKILLS_JSON=/skillstacks-init/skills.json
    CONFIG_DEST=/data/openclaw.json

    echo "skillstacks-init: installing skills from bundled stacks"

    # Copy SKILL.md files from mounted ConfigMaps into the state directory
    for stack_dir in /skillstacks/*/; do
      [ -d "$stack_dir" ] || continue
      for f in "$stack_dir"*.md; do
        [ -f "$f" ] || continue
        SKILL_NAME="$(basename "${f%.md}")"
        mkdir -p "${SKILLS_DIR}/${SKILL_NAME}"
        cp "$f" "${SKILLS_DIR}/${SKILL_NAME}/SKILL.md"
        echo "skillstacks-init: installed ${SKILL_NAME}"
      done
    done

    # Merge skills.json into openclaw.json
    echo "skillstacks-init: merging skills config into openclaw.json"
    if [ ! -f "$CONFIG_DEST" ]; then
      echo "No existing config found; copying skills.json as-is"
      cp "$SKILLS_JSON" "$CONFIG_DEST"
    else
      node /scripts/merge-json5.js "$CONFIG_DEST" "$SKILLS_JSON" > "${CONFIG_DEST}.tmp"
      mv "${CONFIG_DEST}.tmp" "$CONFIG_DEST"
    fi

    echo "skillstacks-init: complete"
{{- end }}
