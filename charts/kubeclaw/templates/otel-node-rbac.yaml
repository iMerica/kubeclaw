{{- if and .Values.observability.enabled .Values.observability.nodeCollector.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubeclaw.nodeCollectorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
    {{- include "kubeclaw.nodeCollectorSelectorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeclaw.nodeCollectorName" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "nodes/stats", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeclaw.nodeCollectorName" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeclaw.nodeCollectorName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeclaw.nodeCollectorName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
