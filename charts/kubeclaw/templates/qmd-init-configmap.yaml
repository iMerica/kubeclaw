{{- if .Values.memory.enabled }}
# QMD init ConfigMap
# Contains the install script used by the qmd-init initContainer (StatefulSet)
# and the qmd-install initContainer (CronJobs). Installs the QMD hybrid search
# CLI and its Bun runtime into a shared emptyDir volume.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.qmdConfigmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
data:
  install.sh: |
    #!/bin/sh
    set -eu

    QMD_BIN_DIR="${QMD_BIN_DIR:-/qmd-bin}"
    QMD_PACKAGE_URL="${QMD_PACKAGE_URL:-@tobilu/qmd}"

    mkdir -p "$QMD_BIN_DIR"

    echo "qmd-init: installing qmd from $QMD_PACKAGE_URL"
    # --ignore-scripts: skip native addon builds (e.g. better-sqlite3's node-gyp).
    # Bun polyfills better-sqlite3 with its built-in bun:sqlite, so native
    # compilation is unnecessary and would fail (no node-gyp in oven/bun image).
    bun install -g --ignore-scripts "$QMD_PACKAGE_URL"

    # Discover installed binary locations. Bun global installs land under
    # ~/.bun/bin/ by default (controlled by BUN_INSTALL_BIN).
    BUN_BIN="$(which bun)"
    QMD_BIN="$(which qmd 2>/dev/null || echo "")"

    if [ -z "$QMD_BIN" ]; then
      for p in "$HOME/.bun/bin/qmd" "/root/.bun/bin/qmd"; do
        if [ -x "$p" ]; then QMD_BIN="$p"; break; fi
      done
    fi

    if [ -z "$QMD_BIN" ]; then
      echo "ERROR: qmd binary not found after install" >&2
      exit 1
    fi

    # Copy bun runtime (qmd is a bun script that needs the runtime on PATH).
    cp "$BUN_BIN" "$QMD_BIN_DIR/bun"
    chmod 0555 "$QMD_BIN_DIR/bun"

    # Copy qmd executable.
    cp "$QMD_BIN" "$QMD_BIN_DIR/qmd"
    chmod 0555 "$QMD_BIN_DIR/qmd"

    # Copy the global node_modules that qmd depends on.
    BUN_GLOBAL_DIR="$(dirname "$(dirname "$QMD_BIN")")"
    if [ -d "$BUN_GLOBAL_DIR/node_modules" ]; then
      cp -r "$BUN_GLOBAL_DIR/node_modules" "$QMD_BIN_DIR/node_modules"
    fi

    echo "qmd-init: installed qmd at $QMD_BIN_DIR/qmd"
    echo "qmd-init: installed bun at $QMD_BIN_DIR/bun"
    ls -la "$QMD_BIN_DIR/"
    echo "qmd-init: complete"
{{- end }}
