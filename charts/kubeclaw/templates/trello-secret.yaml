{{- /*
Create an Opaque Secret holding the Trello API key and token when:
  - trello.enabled is true
  - trello.auth.apiKey or trello.auth.token is non-empty (inline credentials)
  - trello.auth.tokenSecretName is empty (no existing Secret referenced)
*/ -}}
{{- if and .Values.trello.enabled (or .Values.trello.auth.apiKey .Values.trello.auth.token) (not .Values.trello.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.trelloAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.trello.auth.apiKey }}
  {{ include "kubeclaw.trelloApiKeySecretKey" . }}: {{ .Values.trello.auth.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.trello.auth.token }}
  {{ include "kubeclaw.trelloTokenSecretKey" . }}: {{ .Values.trello.auth.token | b64enc | quote }}
  {{- end }}
{{- end }}
