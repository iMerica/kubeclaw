{{- /*
Create an Opaque Secret holding the Tailscale auth key when:
  - tailscale.ssh.enabled is true
  - tailscale.ssh.authKey is non-empty (inline key provided)
  - tailscale.ssh.authKeySecretName is empty (no existing Secret referenced)

When authKeySecretName is set the operator is providing their own Secret, so
this template is skipped entirely to avoid conflicts.
*/ -}}
{{- if and .Values.tailscale.ssh.enabled .Values.tailscale.ssh.authKey (not .Values.tailscale.ssh.authKeySecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.fullname" . }}-tailscale-authkey
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.tailscaleAuthKeySecretKey" . }}: {{ .Values.tailscale.ssh.authKey | b64enc | quote }}
{{- end }}
