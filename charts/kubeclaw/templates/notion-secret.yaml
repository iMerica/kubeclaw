{{- /*
Create an Opaque Secret holding the Notion token when:
  - notion.enabled is true
  - notion.auth.token is non-empty (inline token provided)
  - notion.auth.tokenSecretName is empty (no existing Secret referenced)
*/ -}}
{{- if and .Values.notion.enabled .Values.notion.auth.token (not .Values.notion.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.notionAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.notionAuthSecretKey" . }}: {{ .Values.notion.auth.token | b64enc | quote }}
{{- end }}
