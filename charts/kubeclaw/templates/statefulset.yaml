apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  # replicas is hard-locked to 1. The Gateway is a stateful singleton that owns
  # an exclusive WebSocket listener and all session/channel state. Running multiple
  # replicas causes port-collision failures and data corruption. Enforced by
  # values.schema.json.
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "kubeclaw.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "kubeclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "kubeclaw.configChecksum" . | nindent 8 }}
        {{- if .Values.litellm.enabled }}
        checksum/litellm-config: {{ .Values.litellm.proxy_config | toJson | sha256sum }}
        {{- end }}
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubeclaw.serviceAccountName" . }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      {{- with .Values.pod.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ---------------------------------------------------------------------------
      # initContainer: configMode
      # Only rendered when config.desired is non-empty.
      # Merges or overwrites openclaw.json on the PVC before the Gateway starts.
      # ---------------------------------------------------------------------------
      {{- if .Values.config.desired }}
      initContainers:
        - name: config-init
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/init.sh"]
          env:
            - name: CONFIG_MODE
              value: {{ .Values.config.mode | quote }}
          envFrom:
            - secretRef:
                name: {{ include "kubeclaw.secretName" . }}
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /data
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: init-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      {{- end }}

      containers:
        # -------------------------------------------------------------------------
        # Gateway container
        # -------------------------------------------------------------------------
        - name: gateway
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/index.js", "gateway"]
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            {{- if .Values.nodeOptions }}
            - name: NODE_OPTIONS
              value: {{ .Values.nodeOptions | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.litellm.enabled }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.litellmMasterkeySecretName" . }}
                  key: {{ include "kubeclaw.litellmMasterkeySecretKey" . }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "kubeclaw.secretName" . }}
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /home/node/.openclaw
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
            {{- if .Values.persistence.splitVolumes }}
            - name: {{ include "kubeclaw.workspacePvcName" . }}
              mountPath: /home/node/.openclaw/workspace
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.config.desired }}
            - name: config-src
              mountPath: /config-src
              readOnly: true
            {{- end }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # -----------------------------------------------------------------------
          # Health Probes
          # All three probes use the token-authenticated health command, which
          # performs a real control-plane check (not just TCP socket open).
          # The Gateway multiplexes WebSocket + HTTP on port 18789 and requires
          # auth, making TCP-level probes insufficient.
          # -----------------------------------------------------------------------

          # Startup probe: allow up to 5 minutes for first startup (30 * 10s).
          # initialDelaySeconds gives the process time to bind before the first
          # probe fires, reducing noisy 1006 WebSocket closure events in logs.
          startupProbe:
            exec:
              command:
                - node
                - dist/index.js
                - health
            initialDelaySeconds: 15
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          # Liveness probe: restart if the gateway becomes unresponsive.
          livenessProbe:
            exec:
              command:
                - node
                - dist/index.js
                - health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5

          # Readiness probe: remove from Service endpoints when not ready.
          readinessProbe:
            exec:
              command:
                - node
                - dist/index.js
                - health
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5

        # -------------------------------------------------------------------------
        # Chromium sidecar (optional)
        # Exposes CDP on 127.0.0.1:9222 inside the pod. NOT exposed via Service.
        # The Gateway connects via browser.profiles.chromium.cdpUrl.
        # -------------------------------------------------------------------------
        {{- if .Values.chromium.enabled }}
        - name: chromium
          image: {{ .Values.chromium.image.repository }}:{{ .Values.chromium.image.tag }}
          imagePullPolicy: {{ .Values.chromium.image.pullPolicy }}
          command: ["chromium-browser"]
          {{- with .Values.chromium.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: XDG_CACHE_HOME
              value: /tmp
          ports:
            - name: cdp
              containerPort: {{ .Values.chromium.cdpPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.chromium.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.chromium.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Allow extra time for Chromium to load before health checks begin.
          startupProbe:
            tcpSocket:
              port: {{ .Values.chromium.cdpPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.chromium.cdpPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.chromium.cdpPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
        {{- end }}

        # -------------------------------------------------------------------------
        # Tailscale sidecar (optional)
        # Provides SSH access into the pod via the tailnet.
        # -------------------------------------------------------------------------
        {{- if .Values.tailscale.ssh.enabled }}
        - name: tailscale
          image: {{ .Values.tailscale.ssh.image.repository }}:{{ .Values.tailscale.ssh.image.tag }}
          imagePullPolicy: {{ .Values.tailscale.ssh.image.pullPolicy }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.tailscaleAuthKeySecretName" . }}
                  key: {{ include "kubeclaw.tailscaleAuthKeySecretKey" . }}
            - name: TS_HOSTNAME
              value: {{ include "kubeclaw.tailscaleHostname" . | quote }}
            # Use a subdirectory of the shared tmp emptyDir so uid 1000 can
            # create and chmod it freely. /var/lib/tailscale is root-owned on
            # mount and chmod fails with "operation not permitted".
            - name: TS_STATE_DIR
              value: /tmp/tailscale-state
            # Disable the Kubernetes Secret state backend. We use TS_STATE_DIR
            # (emptyDir or PVC) instead. Without this the client attempts to
            # get/update a Secret named "tailscale" and logs RBAC errors.
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_USERSPACE
              value: {{ .Values.tailscale.ssh.userspace | quote }}
            - name: TS_EXTRA_ARGS
              value: "--ssh"
            {{- with .Values.tailscale.ssh.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.tailscale.ssh.userspace }}
          # Run as root in userspace mode. Tailscale SSH requires a resolvable
          # username — uid 1000 has no /etc/passwd entry in this image so SSH
          # logins fail with "failed to look up 1000". Root is always resolvable
          # and carries no extra risk in userspace networking mode (no host
          # network access, no kernel bypass).
          # runAsNonRoot: false overrides the pod-level securityContext.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          {{- else }}
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
          {{- end }}
          resources:
            {{- toYaml .Values.tailscale.ssh.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Startup/liveness probes use `tailscale --version` which exits 0
          # immediately from compiled-in data. The tailscale/tailscale image is
          # distroless so no shell is available; avoid any /bin/sh commands.
          startupProbe:
            exec:
              command:
                - tailscale
                - --version
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - tailscale
                - --version
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
        {{- end }}

      # ---------------------------------------------------------------------------
      # Volumes (non-PVC)
      # ---------------------------------------------------------------------------
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.config.desired }}
        - name: config-src
          configMap:
            name: {{ include "kubeclaw.configmapName" . }}
            items:
              - key: openclaw.json
                path: openclaw.json
        - name: init-script
          configMap:
            name: {{ include "kubeclaw.initScriptConfigmapName" . }}
            defaultMode: 0555
        {{- end }}
        {{- if and .Values.tailscale.ssh.enabled (not .Values.tailscale.ssh.persistState) }}
        - name: ts-state
          emptyDir: {}
        {{- end }}

  # ---------------------------------------------------------------------------
  # volumeClaimTemplates — PVCs provisioned and owned by the StatefulSet.
  # These persist across pod restarts and deletions (must be deleted manually).
  # ---------------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: {{ include "kubeclaw.statePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- if .Values.persistence.splitVolumes }}
    - metadata:
        name: {{ include "kubeclaw.workspacePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.workspace.accessModes | nindent 10 }}
        {{- if .Values.persistence.workspace.storageClass }}
        storageClassName: {{ .Values.persistence.workspace.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.workspace.size }}
    {{- end }}
    {{- if and .Values.tailscale.ssh.enabled .Values.tailscale.ssh.persistState }}
    - metadata:
        name: ts-state
      spec:
        accessModes: {{ toYaml .Values.tailscale.ssh.stateStorage.accessModes | nindent 10 }}
        {{- if .Values.tailscale.ssh.stateStorage.storageClass }}
        storageClassName: {{ .Values.tailscale.ssh.stateStorage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.tailscale.ssh.stateStorage.size }}
    {{- end }}
