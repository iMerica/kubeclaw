{{- include "kubeclaw.validateValues" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kubeclaw.gatewayName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  # replicas is hard-locked to 1. The Gateway is a stateful singleton that owns
  # an exclusive WebSocket listener and all session/channel state. Running multiple
  # replicas causes port-collision failures and data corruption. Enforced by
  # values.schema.json.
  replicas: 1
  selector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "kubeclaw.gatewayName" . }}
  template:
    metadata:
      labels:
        {{- include "kubeclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "kubeclaw.configChecksum" . | nindent 8 }}
        {{- if .Values.litellm.enabled }}
        checksum/litellm-config: {{ .Values.litellm.proxy_config | toJson | sha256sum }}
        {{- end }}
        {{- with .Values.pod.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubeclaw.serviceAccountName" . }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      {{- with .Values.pod.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # ---------------------------------------------------------------------------
      # initContainers
      # ---------------------------------------------------------------------------
      {{- if or .Values.config.desired .Values.egressFilter.enabled }}
      initContainers:
        {{- if .Values.config.desired }}
        # config-init: merges or overwrites openclaw.json on the PVC.
        - name: config-init
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/init.sh"]
          env:
            - name: CONFIG_MODE
              value: {{ .Values.config.mode | quote }}
          envFrom:
            - secretRef:
                name: {{ include "kubeclaw.secretName" . }}
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /data
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
            - name: config-src
              mountPath: /config-src
              readOnly: true
            - name: init-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
        {{- end }}
        {{- if .Values.egressFilter.enabled }}
        # dns-init: resolves the egress-filter Service to a ClusterIP and writes
        # a resolv.conf that routes all DNS through Blocky. Uses the default
        # cluster DNS (available at this point) to look up the Service IP.
        - name: dns-init
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              FILTER_IP=$(getent hosts {{ include "kubeclaw.egressFilterName" . }}.{{ .Release.Namespace }}.svc.cluster.local | awk '{print $1}')
              if [ -z "$FILTER_IP" ]; then
                echo "ERROR: Could not resolve {{ include "kubeclaw.egressFilterName" . }}" >&2
                exit 1
              fi
              echo "Resolved egress-filter Service to $FILTER_IP"
              cat > /etc/resolv-override/resolv.conf <<EOF
              nameserver $FILTER_IP
              search {{ .Release.Namespace }}.svc.cluster.local svc.cluster.local cluster.local
              options ndots:5
              EOF
              # strip leading whitespace from heredoc indentation
              sed -i 's/^[[:space:]]*//' /etc/resolv-override/resolv.conf
              echo "Wrote /etc/resolv-override/resolv.conf:"
              cat /etc/resolv-override/resolv.conf
          volumeMounts:
            - name: resolv-override
              mountPath: /etc/resolv-override
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
        {{- end }}
      {{- end }}

      containers:
        # -------------------------------------------------------------------------
        # Gateway container
        # -------------------------------------------------------------------------
        - name: gateway
          image: {{ include "kubeclaw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/index.js", "gateway"]
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            {{- if .Values.nodeOptions }}
            - name: NODE_OPTIONS
              value: {{ .Values.nodeOptions | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.litellm.enabled }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.litellmMasterkeySecretName" . }}
                  key: {{ include "kubeclaw.litellmMasterkeySecretKey" . }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "kubeclaw.secretName" . }}
          volumeMounts:
            - name: {{ include "kubeclaw.statePvcName" . }}
              mountPath: /home/node/.openclaw
              {{- if .Values.persistence.splitVolumes }}
              subPath: state
              {{- end }}
            {{- if .Values.persistence.splitVolumes }}
            - name: {{ include "kubeclaw.workspacePvcName" . }}
              mountPath: /home/node/.openclaw/workspace
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.config.desired }}
            - name: config-src
              mountPath: /config-src
              readOnly: true
            {{- end }}
            {{- if .Values.egressFilter.enabled }}
            - name: resolv-override
              mountPath: /etc/resolv.conf
              subPath: resolv.conf
              readOnly: true
            {{- end }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # -----------------------------------------------------------------------
          # Health Probes
          # Startup uses tcpSocket for speed — avoids spawning a Node.js process
          # on every probe during boot. Once the startup probe passes, liveness
          # and readiness switch to the token-authenticated health command for a
          # deeper control-plane check.
          # -----------------------------------------------------------------------

          # Startup probe: TCP check until the Gateway binds port 18789.
          # Allow up to 5 minutes for first startup (30 * 10s).
          startupProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 3

          # Liveness probe: restart if the gateway becomes unresponsive.
          livenessProbe:
            exec:
              command:
                - node
                - dist/index.js
                - health
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 10

          # Readiness probe: remove from Service endpoints when not ready.
          readinessProbe:
            exec:
              command:
                - node
                - dist/index.js
                - health
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 10

        # -------------------------------------------------------------------------
        # Tailscale sidecar (optional)
        # Provides SSH access into the pod via the tailnet.
        # -------------------------------------------------------------------------
        {{- if .Values.tailscale.ssh.enabled }}
        - name: tailscale
          image: {{ .Values.tailscale.ssh.image.repository }}:{{ .Values.tailscale.ssh.image.tag }}
          imagePullPolicy: {{ .Values.tailscale.ssh.image.pullPolicy }}
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeclaw.tailscaleAuthKeySecretName" . }}
                  key: {{ include "kubeclaw.tailscaleAuthKeySecretKey" . }}
            - name: TS_HOSTNAME
              value: {{ include "kubeclaw.tailscaleHostname" . | quote }}
            # Use a subdirectory of the shared tmp emptyDir so uid 1000 can
            # create and chmod it freely. /var/lib/tailscale is root-owned on
            # mount and chmod fails with "operation not permitted".
            - name: TS_STATE_DIR
              value: /tmp/tailscale-state
            # Disable the Kubernetes Secret state backend. We use TS_STATE_DIR
            # (emptyDir or PVC) instead. Without this the client attempts to
            # get/update a Secret named "tailscale" and logs RBAC errors.
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_USERSPACE
              value: {{ .Values.tailscale.ssh.userspace | quote }}
            - name: TS_EXTRA_ARGS
              value: "--ssh"
            {{- with .Values.tailscale.ssh.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.tailscale.ssh.userspace }}
          # Run as root in userspace mode. Tailscale SSH requires a resolvable
          # username — uid 1000 has no /etc/passwd entry in this image so SSH
          # logins fail with "failed to look up 1000". Root is always resolvable
          # and carries no extra risk in userspace networking mode (no host
          # network access, no kernel bypass).
          # runAsNonRoot: false overrides the pod-level securityContext.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          {{- else }}
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
          {{- end }}
          resources:
            {{- toYaml .Values.tailscale.ssh.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # Startup/liveness probes use `tailscale --version` which exits 0
          # immediately from compiled-in data. The tailscale/tailscale image is
          # distroless so no shell is available; avoid any /bin/sh commands.
          startupProbe:
            exec:
              command:
                - tailscale
                - --version
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - tailscale
                - --version
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
        {{- end }}

      # ---------------------------------------------------------------------------
      # Volumes (non-PVC)
      # ---------------------------------------------------------------------------
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.config.desired }}
        - name: config-src
          configMap:
            name: {{ include "kubeclaw.configmapName" . }}
            items:
              - key: openclaw.json
                path: openclaw.json
        - name: init-script
          configMap:
            name: {{ include "kubeclaw.initScriptConfigmapName" . }}
            defaultMode: 0555
        {{- end }}
        {{- if .Values.egressFilter.enabled }}
        - name: resolv-override
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
        {{- if and .Values.tailscale.ssh.enabled (not .Values.tailscale.ssh.persistState) }}
        - name: ts-state
          emptyDir: {}
        {{- end }}

  # ---------------------------------------------------------------------------
  # volumeClaimTemplates — PVCs provisioned and owned by the StatefulSet.
  # These persist across pod restarts and deletions (must be deleted manually).
  # ---------------------------------------------------------------------------
  volumeClaimTemplates:
    - metadata:
        name: {{ include "kubeclaw.statePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- if .Values.persistence.splitVolumes }}
    - metadata:
        name: {{ include "kubeclaw.workspacePvcName" . }}
      spec:
        accessModes: {{ toYaml .Values.persistence.workspace.accessModes | nindent 10 }}
        {{- if .Values.persistence.workspace.storageClass }}
        storageClassName: {{ .Values.persistence.workspace.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.workspace.size }}
    {{- end }}
    {{- if and .Values.tailscale.ssh.enabled .Values.tailscale.ssh.persistState }}
    - metadata:
        name: ts-state
      spec:
        accessModes: {{ toYaml .Values.tailscale.ssh.stateStorage.accessModes | nindent 10 }}
        {{- if .Values.tailscale.ssh.stateStorage.storageClass }}
        storageClassName: {{ .Values.tailscale.ssh.stateStorage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.tailscale.ssh.stateStorage.size }}
    {{- end }}
