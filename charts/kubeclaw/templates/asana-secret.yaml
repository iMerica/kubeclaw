{{- /*
Create an Opaque Secret holding the Asana PAT when:
  - asana.enabled is true
  - asana.auth.token is non-empty (inline token provided)
  - asana.auth.tokenSecretName is empty (no existing Secret referenced)
*/ -}}
{{- if and .Values.asana.enabled .Values.asana.auth.token (not .Values.asana.auth.tokenSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeclaw.asanaAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{ include "kubeclaw.asanaAuthSecretKey" . }}: {{ .Values.asana.auth.token | b64enc | quote }}
{{- end }}
