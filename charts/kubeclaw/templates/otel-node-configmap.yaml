{{- if and .Values.observability.enabled .Values.observability.nodeCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.nodeCollectorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
    {{- include "kubeclaw.nodeCollectorSelectorLabels" . | nindent 4 }}
data:
  otel-config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_path: true
        operators:
          - type: router
            id: container_parser_router
            routes:
              - output: cri_parser
                expr: 'body matches "^[^ Z]+ "'
            default: docker_parser
          - type: regex_parser
            id: cri_parser
            regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          - type: json_parser
            id: docker_parser
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: move
            from: attributes.log
            to: body
          - type: remove
            field: attributes.time
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          network: {}
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "https://${env:NODE_NAME}:10250"
        insecure_skip_verify: true

    processors:
      batch:
        send_batch_size: 1024
        timeout: 5s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.container.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      resourcedetection:
        detectors: [env, system]
        timeout: 5s

    exporters:
      otlp:
        endpoint: {{ include "kubeclaw.otelGatewayGrpcEndpoint" . | quote }}
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [k8sattributes, resourcedetection, batch]
          exporters: [otlp]
        metrics:
          receivers: [hostmetrics, kubeletstats]
          processors: [resourcedetection, batch]
          exporters: [otlp]
      telemetry:
        logs:
          level: info
      extensions: []
{{- end }}
