{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy for the OpenClaw Gateway.
# Restricts ingress to the Ingress controller namespace and within-namespace
# traffic. Egress is fully open by default (allowAll: true).
#
# NOTE: Kubernetes NetworkPolicy operates at L3/L4 (IP/port). FQDN-based
# allowlists require a CNI with FQDN support (Cilium, Calico) or a proxy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
    {{- if not .Values.networkPolicy.egress.allowAll }}
    - Egress
    {{- end }}

  ingress:
    # Allow traffic from within the same namespace (kubectl exec, internal services).
    - from:
        - podSelector: {}

    # Allow traffic from the Ingress controller namespace.
    # Configure ingressControllerNamespaceSelector to match your controller.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 18789

  {{- if not .Values.networkPolicy.egress.allowAll }}
  # Egress scaffold for "deny all except DNS + configured CIDRs".
  # Uncomment and configure the CIDRs/ports you need.
  # Requires networkPolicy.egress.allowAll: false.
  egress:
    # Allow DNS resolution (required for most workloads).
    {{- if .Values.egressFilter.enabled }}
    # dns-init runs before /etc/resolv.conf is rewritten to the egress-filter
    # Service, so it must still reach cluster DNS in kube-system to resolve the
    # egress-filter Service name.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Gateway pods use the egress-filter Service as nameserver (port 53),
    # which forwards to Blocky on container port 5353. Some CNIs enforce
    # policies post-DNAT, so allow both service and target ports.
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubeclaw.egressFilterSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
    {{- else }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    # Allow HTTPS egress (add/remove as needed).
    - ports:
        - protocol: TCP
          port: 443
    {{- if .Values.litellm.enabled }}
    # Allow egress to the LiteLLM proxy pod on port 4000.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: litellm
      ports:
        - protocol: TCP
          port: 4000
    {{- end }}
    {{- if .Values.observability.enabled }}
    # Allow egress to the OTel Collector (ClickStack) on OTLP ports.
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    {{- end }}
    # Example: restrict to specific CIDRs only.
    # - to:
    #     - ipBlock:
    #         cidr: 10.0.0.0/8
    #   ports:
    #     - protocol: TCP
    #       port: 443
  {{- end }}
{{- end }}
