{{- if .Values.config.desired }}
# ConfigMap: desired openclaw.json config (JSON5).
# Mounted read-only into the Gateway pod at /config-src.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeclaw.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
data:
  openclaw.json: |
    {{- .Values.config.desired | nindent 4 }}
{{- end }}
