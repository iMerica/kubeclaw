apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- with .Values.service.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if .Values.tailscale.expose.enabled }}
  {{- $_ := set $annotations "tailscale.com/expose" "true" }}
  {{- with .Values.tailscale.expose.hostname }}
  {{- $_ := set $annotations "tailscale.com/hostname" . }}
  {{- end }}
  {{- with .Values.tailscale.expose.tags }}
  {{- $_ := set $annotations "tailscale.com/tags" . }}
  {{- end }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: gateway
      port: {{ .Values.service.port }}
      targetPort: gateway
      protocol: TCP
  selector:
    {{- include "kubeclaw.selectorLabels" . | nindent 4 }}
