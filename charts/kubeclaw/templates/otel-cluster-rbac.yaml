{{- if and .Values.observability.enabled .Values.observability.clusterCollector.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubeclaw.clusterCollectorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
    {{- include "kubeclaw.clusterCollectorSelectorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeclaw.clusterCollectorName" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events", "nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeclaw.clusterCollectorName" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeclaw.clusterCollectorName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeclaw.clusterCollectorName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
