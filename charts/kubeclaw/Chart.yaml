apiVersion: v2
name: kubeclaw
description: >
  Helm chart for deploying a single OpenClaw AI automation Gateway on Kubernetes.
  Provides a stateful single-replica Gateway with durable PVC-backed storage,
  WebSocket-capable Ingress, health probes, optional Chromium sidecar, and
  GitOps-friendly desired-config management via initContainer.
type: application
version: 0.1.0
appVersion: "latest"
dependencies:
  - name: litellm-helm
    version: "1.81.13"
    repository: "oci://ghcr.io/berriai"
    condition: litellm.enabled
    alias: litellm
  - name: clickstack
    version: "1.1.1"
    repository: "https://clickhouse.github.io/ClickStack-helm-charts"
    condition: observability.enabled
    alias: clickstack
  - name: gateway-helm
    version: "v1.3.0"
    repository: "oci://docker.io/envoyproxy"
    condition: gatewayAPI.controller.enabled
    alias: envoyGateway
keywords:
  - kubeclaw
  - openclaw
  - ai
  - automation
  - gateway
  - websocket
home: https://github.com/iMerica/kubeclaw
sources:
  - https://github.com/iMerica/kubeclaw
maintainers:
  - name: KubeClaw
    url: https://kubeclaw.dev
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/signKey: |
    fingerprint: <GPG_FINGERPRINT>
    url: https://kubeclaw.dev/gpg.asc
