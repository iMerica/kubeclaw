# ==============================================================================
# OpenClaw Helm Chart — Default Values
# ==============================================================================
# All values are documented inline. Required fields are marked with REQUIRED.
# See https://github.com/iMerica/kubeclaw for full documentation.

# ------------------------------------------------------------------------------
# Image
# ------------------------------------------------------------------------------
image:
  # REQUIRED: Docker image repository for the OpenClaw Gateway.
  repository: ghcr.io/openclaw/openclaw
  # REQUIRED: Release tag tested for this chart release.
  tag: "2026.2.21"
  # REQUIRED: Immutable image digest to prevent tag drift.
  digest: "sha256:ce271192cd70250d16fc5911903d9953467a40faf8b34e87cbd042e6b49b6036"
  # Pull policy: Always | IfNotPresent | Never
  pullPolicy: IfNotPresent

# Image pull secrets for private registries.
# imagePullSecrets:
#   - name: my-registry-secret
imagePullSecrets: []

# ------------------------------------------------------------------------------
# Replica count — MUST remain 1.
# The OpenClaw Gateway is a stateful process that holds exclusive listener
# state. Running multiple replicas causes port-collision failures and data
# corruption. This is enforced by the JSON schema (values.schema.json).
# ------------------------------------------------------------------------------
replicaCount: 1

# ------------------------------------------------------------------------------
# Gateway Secret
# The Gateway requires OPENCLAW_GATEWAY_TOKEN for authenticated health probes
# and non-loopback binds. Treat this like a strong password.
# ------------------------------------------------------------------------------
secret:
  # Create a Kubernetes Secret from secret.data values below.
  create: true
  # If create=false and existingSecretName is set, the StatefulSet references
  # that Secret via envFrom. The Secret must contain OPENCLAW_GATEWAY_TOKEN.
  existingSecretName: ""
  # Key/value pairs written into the Secret (plain text; encoded at template time).
  # OPENCLAW_GATEWAY_TOKEN is required. Add provider API keys as needed.
  data:
    # REQUIRED for non-loopback binds and health probes.
    OPENCLAW_GATEWAY_TOKEN: ""
    # Provider keys (examples):
    # ANTHROPIC_API_KEY: ""
    # OPENAI_API_KEY: ""

# ------------------------------------------------------------------------------
# Persistent Storage
# The Gateway stores all state under /home/node/.openclaw.
# Default: single PVC. Optional: split state vs workspace PVCs.
# ------------------------------------------------------------------------------
persistence:
  # Storage class for the PVC. Empty = cluster default.
  storageClass: ""
  # Size of the primary state PVC.
  size: 5Gi
  # AccessMode for PVC.
  accessModes:
    - ReadWriteOnce
  # Split into separate state and workspace PVCs.
  # When true:
  #   - "state" PVC mounts at /home/node/.openclaw (subPath: state)
  #   - "workspace" PVC mounts at /home/node/.openclaw/workspace
  splitVolumes: false
  workspace:
    storageClass: ""
    size: 5Gi
    accessModes:
      - ReadWriteOnce

# ------------------------------------------------------------------------------
# Desired Configuration (GitOps / ConfigMode)
# If set, a ConfigMap is created containing openclaw.json and an initContainer
# runs before the Gateway to merge or overwrite the config on the PVC.
# A checksum annotation ensures rollout is triggered when config changes.
# ------------------------------------------------------------------------------
config:
  # JSON5 config to write to openclaw.json on startup.
  # Default sets gateway.mode=local so the Gateway starts without interactive
  # setup, and gateway.bind=lan so it listens on 0.0.0.0 (reachable by
  # kubelet probes and the Service).
  # Set to "" to disable config management entirely.
  # Example with additional settings:
  #   desired: |
  #     {
  #       "gateway": { "mode": "local", "bind": "lan" },
  #       "tools": { "exec": { "enabled": true } }
  #     }
  desired: |
    {
      "gateway": { "mode": "local", "bind": "lan" },
      "browser": {
        "enabled": true,
        "defaultProfile": "default",
        "profiles": {
          "default": {
            "cdpUrl": "http://kubeclaw-chromium:9222",
            "color": "#4285F4"
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "litellm": {
            "baseUrl": "http://kubeclaw-litellm:4000",
            "apiKey": "${LITELLM_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "gpt-4o",
                "name": "GPT-4o",
                "reasoning": false,
                "input": ["text", "image"],
                "contextWindow": 128000,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "litellm/gpt-4o"
          },
          "userTimezone": "UTC",
          "timeoutSeconds": 600,
          "maxConcurrent": 1
        },
        "list": [
          {
            "id": "main",
            "default": true,
            "identity": {
              "name": "KubeClaw",
              "emoji": "🦞"
            }
          }
        ]
      }
    }
  # merge: apply JSON merge-patch (objects merge recursively, arrays replace,
  #        null deletes keys). Preserves runtime-edited values not in desired.
  # overwrite: replace the entire config file with desired (equivalent to
  #            openclaw config apply). Safe for fully declarative setups.
  mode: merge

# ------------------------------------------------------------------------------
# Node.js runtime options
# NODE_OPTIONS is passed to every `node` invocation in the Gateway container.
# Increase --max-old-space-size (in MiB) if the Gateway hits a JavaScript heap
# out-of-memory error. Keep it below the container memory limit to leave room
# for native allocations and OS overhead (~75 % of limit is a safe default).
# Set to "" to suppress NODE_OPTIONS entirely.
# ------------------------------------------------------------------------------
nodeOptions: "--max-old-space-size=768"

# Extra environment variables injected into the Gateway container.
# Accepts standard Kubernetes env-var objects (name/value or valueFrom).
# Example:
#   extraEnv:
#     - name: HTTP_PROXY
#       value: "http://proxy.corp.example.com:3128"
extraEnv: []

# ------------------------------------------------------------------------------
# Resources
# ------------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# ------------------------------------------------------------------------------
# Service
# The Gateway multiplexes WebSocket + HTTP Control UI on port 18789.
# ------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 18789
  # Optional: extra annotations for cloud load balancers etc.
  annotations: {}

# ------------------------------------------------------------------------------
# Ingress
# WebSocket requires long proxy timeouts. Annotations below target ingress-nginx.
# Default off — enable only when you need external access.
# Keep Gateway token auth enabled; exposing without auth is dangerous.
# ------------------------------------------------------------------------------
ingress:
  enabled: false
  # Ingress class name (Kubernetes 1.18+). Overrides deprecated annotation.
  className: nginx
  # Per-controller annotations. Defaults include WebSocket timeout for nginx.
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  # Hostname for the Ingress rule.
  host: openclaw.example.com
  # TLS configuration. Each item maps to a Secret holding the TLS cert.
  tls: []
  # - secretName: openclaw-tls
  #   hosts:
  #     - openclaw.example.com

# ------------------------------------------------------------------------------
# Gateway API (gateway.networking.k8s.io/v1)
# Alternative to Ingress for clusters with a Gateway API controller (Envoy
# Gateway, Istio, Cilium, etc.). Creates a single Gateway resource with
# path-based HTTPRoutes for all HTTP-accessible services.
# Mutually exclusive with ingress.enabled in intent, though both can coexist.
# ------------------------------------------------------------------------------
gatewayAPI:
  enabled: true
  # Gateway class — must match your cluster's GatewayClass (e.g. envoy, istio, cilium).
  # When controller.enabled=true and this is empty, defaults to controller.gatewayClassName.
  gatewayClassName: ""
  # Hostname for all routes
  host: openclaw.example.com
  # Route path prefixes (customize if needed)
  routes:
    openclaw: /
    o11y: /o11y
    litellm: /litellm
    filtering: /filtering
  # TLS configuration
  tls: {}
  #   certificateRefs:
  #     - name: openclaw-tls
  # Optional annotations on the Gateway resource
  annotations: {}
  # Install Gateway API CRDs as chart-managed resources.
  # Not needed when controller.enabled=true (Envoy Gateway bundles its own).
  crds:
    install: false
  # Deploy Envoy Gateway as a subchart. Creates a GatewayClass automatically.
  # Users with an existing controller (Istio, Cilium) leave this false.
  controller:
    enabled: true
    gatewayClassName: envoy

# Envoy Gateway subchart overrides (only when gatewayAPI.controller.enabled=true).
envoy-gateway: {}

# ------------------------------------------------------------------------------
# NetworkPolicy
# Default off to avoid breaking clusters without a NetworkPolicy-capable CNI.
# When enabled, restricts inbound traffic to the Ingress controller namespace.
# ------------------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Labels that identify the Ingress controller namespace.
  # Used to build the ingress-from-ingress-controller NetworkPolicy rule.
  ingressControllerNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx
  # Allow all egress (OSS default). Set false to enable egress scaffolding.
  egress:
    allowAll: false

# ------------------------------------------------------------------------------
# Chromium Deployment (remote CDP)
# Deploys Chromium as a standalone Deployment + ClusterIP Service. The Gateway
# connects via browser.profiles.default.cdpUrl = http://<release>-chromium:9222.
# CDP port 9222 is exposed as a ClusterIP Service (cluster-internal only).
# NOTE: Running Chromium in containers often requires --no-sandbox; read the
# security notes in the values below before enabling.
# ------------------------------------------------------------------------------
chromium:
  enabled: true
  image:
    repository: zenika/alpine-chrome
    tag: "124"
    pullPolicy: IfNotPresent
  # Container port for Chrome DevTools Protocol.
  cdpPort: 9222
  # Resources for the Chromium Deployment.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Security context for the Chromium Deployment container.
  # zenika/alpine-chrome runs as uid 1000 (non-root) with a read-only root
  # filesystem and drops all Linux capabilities.
  # For stronger isolation, consider gVisor/Kata via pod.runtimeClassName.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # Default headless Chrome args with remote debugging enabled.
  # Override or extend via extraArgs.
  extraArgs:
    - --headless
    - --disable-gpu
    - --no-sandbox
    - --disable-dev-shm-usage
    - --remote-debugging-address=0.0.0.0
    - --remote-debugging-port=9222
    - --user-data-dir=/tmp/chromium

# ------------------------------------------------------------------------------
# Egress DNS Filter (Blocky)
# Deploys a Blocky DNS proxy as a separate Deployment + ClusterIP Service.
# When enabled, the Gateway pod's DNS is routed through Blocky via
# dnsPolicy: None, filtering all queries with maintained threat-intelligence
# blocklists, country TLD blocking, and custom deny/allow lists.
# Similar to NextDNS but self-hosted within the cluster.
# Blocky API port 4000 is available on the Service for metrics/debugging.
# ------------------------------------------------------------------------------
egressFilter:
  enabled: true
  image:
    repository: spx01/blocky
    tag: "v0.24"
    pullPolicy: IfNotPresent
  # Number of Blocky replicas. 1 is sufficient for a single Gateway.
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Security context for the Blocky container.
  # The spx01/blocky image runs as uid 100 (non-root). The binary is only
  # executable by that user, so runAsUser must match.
  # NOTE: capabilities.drop=[ALL] is intentionally omitted — the blocky binary
  # fails with "operation not permitted" when all capabilities are dropped on
  # Docker Desktop (and potentially other runtimes).
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 100
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

  # Upstream DNS servers Blocky forwards allowed queries to.
  # Default: kube-dns at the standard ClusterIP. Adjust if your cluster differs.
  upstreamDns:
    default:
      - 10.96.0.10
    # DNS-over-HTTPS upstreams (optional, for external resolution):
    # external:
    #   - https://1.1.1.1/dns-query
    #   - https://8.8.8.8/dns-query

  # Country TLD blocking. Each 2-letter code maps to that country's TLDs.
  # Supported: RU (.ru, .su, .рф), CN (.cn, .中国, .中國), IR (.ir), KP (.kp), BY (.by)
  blockCountries:
    - RU
    - CN

  # Maintained blocklists (fetched and refreshed periodically by Blocky).
  # Each key is a named group; all groups are applied to every client.
  denylists:
    threats:
      - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/domains/tif.txt
    malware:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
    # oisd:
    #   - https://big.oisd.nl/domainswildcard

  # Domains that are never blocked (overrides all denylists).
  allowlists: []
    # - "api.openai.com"
    # - "api.anthropic.com"
    # - "*.slack.com"

  # Query logging. Blocked queries are logged to container stdout.
  queryLog:
    enabled: true
    # Log type: console (stdout) or csv.
    type: console
    # What to log: "blocked" (only blocked queries) or "all" (every query).
    logLevel: blocked

  # Prometheus metrics endpoint on :4000/metrics.
  metrics:
    enabled: true

  # Escape hatch: provide a complete Blocky config.yml. When set, all other
  # egressFilter settings (except image, replicas, resources, securityContext)
  # are ignored and this is rendered verbatim.
  customConfig: |
    upstream:
      default:
        - 10.96.0.10
    ports:
      dns: 5353
      http: 4000
    blocking:
      blackLists:
        blockAll:
          - |
            *
      whiteLists:
        blockAll:
          - api.github.com
          - github.com
          - slack.com
          - wss-primary.slack.com
          - gmail.googleapis.com
          - oauth2.googleapis.com
          - accounts.google.com
      clientGroupsBlock:
        default:
          - blockAll

# ------------------------------------------------------------------------------
# Diagnostics CronJob
# Runs `openclaw doctor --yes` and `openclaw status --all` on a schedule.
# Output is written to pod logs (stream to your logging stack).
# ------------------------------------------------------------------------------
diagnostics:
  enabled: true
  # Cron schedule (default: hourly).
  schedule: "0 * * * *"
  # Concurrency policy: Forbid prevents overlapping runs.
  concurrencyPolicy: Forbid
  # History limits.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 256Mi

# ------------------------------------------------------------------------------
# Tailscale Integration
# Two independent features:
#   expose — annotates the Service for the Tailscale K8s Operator to proxy
#            port 18789 onto your tailnet (no public ingress needed).
#   ssh    — adds a Tailscale sidecar container with --ssh so operators can
#            SSH into the pod from any enrolled tailnet device.
# Both are enabled by default.
# ------------------------------------------------------------------------------
tailscale:
  expose:
    enabled: true
    # Hostname the Tailscale operator assigns on the tailnet.
    hostname: ""
    # ACL tags applied to the exposed service (e.g. "tag:k8s,tag:kubeclaw").
    tags: ""
  ssh:
    enabled: true
    image:
      repository: tailscale/tailscale
      tag: "v1.78.1"
      pullPolicy: IfNotPresent
    # Tailscale auth key (inline). One of authKey or authKeySecretName is
    # required when ssh.enabled=true (enforced by values.schema.json).
    authKey: ""
    # OR reference an existing Secret containing the auth key.
    authKeySecretName: ""
    # Key within the Secret that holds the Tailscale auth key.
    authKeySecretKey: "TS_AUTHKEY"
    # Tailnet hostname for the sidecar. Defaults to Helm fullname.
    hostname: ""
    # Userspace networking mode (recommended). When true, no NET_ADMIN
    # capability is needed. The sidecar runs as root regardless so Tailscale
    # SSH can resolve the username (uid 1000 has no /etc/passwd entry).
    userspace: true
    # Persist Tailscale state across restarts. When false, uses emptyDir
    # and re-registers with the tailnet on every pod restart.
    persistState: false
    stateStorage:
      storageClass: ""
      size: 100Mi
      accessModes:
        - ReadWriteOnce
    # Extra environment variables for the Tailscale sidecar.
    extraEnv: []
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ------------------------------------------------------------------------------
# Observability — Wide Events (ClickStack)
# Deploys ClickHouse + HyperDX + OTel Collector (ClickStack subchart) plus
# KubeClaw-specific OTel collectors (DaemonSet for node logs/metrics,
# Deployment for k8s events/cluster metrics).
# ------------------------------------------------------------------------------
observability:
  # Master toggle — enables the ClickStack subchart and OTel collectors.
  enabled: true

  # Gateway OTEL integration — injects OTEL env vars into the Gateway container
  # so application-level traces and logs are exported to the OTel Collector.
  gateway:
    enabled: true
    # OTEL service name reported by the Gateway.
    serviceName: openclaw-gateway
    # Additional OTEL resource attributes (comma-separated key=value pairs).
    # These are appended to the auto-detected k8s attributes.
    resourceAttributes: ""

  # Node Collector — DaemonSet that collects pod logs and host metrics from
  # every node and forwards them to the ClickStack OTel Collector gateway.
  nodeCollector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.120.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Tolerations for the DaemonSet. Default: schedule on all nodes.
    tolerations:
      - operator: Exists

  # Cluster Collector — single-replica Deployment that collects Kubernetes
  # events and cluster-level metrics.
  clusterCollector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.120.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Optional Ingress for the HyperDX UI.
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    host: hyperdx.example.com
    tls: []
    # - secretName: hyperdx-tls
    #   hosts:
    #     - hyperdx.example.com

# ClickStack subchart overrides (only used when observability.enabled=true).
# See https://github.com/clickhouse/ClickStack-helm-charts for full reference.
clickstack:
  global:
    # The upstream default is "local-path", which does not exist on most clusters.
    # Empty string uses the cluster's default StorageClass.
    storageClassName: ""

# ------------------------------------------------------------------------------
# LiteLLM Proxy (optional subchart)
# When enabled, deploys a LiteLLM proxy alongside the Gateway and injects
# OPENAI_API_BASE into the Gateway container so all LLM SDK calls route through
# the proxy transparently.
#
# Benefits: per-agent virtual keys, budget caps, model fallback routing,
# semantic caching, and content guardrails, all configured declaratively.
#
# IMPORTANT: litellm.masterkey (or masterkeySecretName) is required when enabled.
# The master key must start with "sk-".
# ------------------------------------------------------------------------------
litellm:
  enabled: true

  # Override the LiteLLM container image tag. The upstream chart's default tag
  # (main-v<appVersion>) is not always published; pin to a known-good tag here.
  image:
    tag: "main-v1.61.0"

  # Master key for the LiteLLM proxy API. Must start with "sk-".
  # Set this or provide masterkeySecretName below.
  masterkey: ""

  # Reference an existing Secret instead of setting masterkey above.
  # The Secret must contain the key named in masterkeySecretKey.
  masterkeySecretName: ""
  masterkeySecretKey: "masterkey"

  # Secrets mounted as environment variables on the LiteLLM proxy pod.
  # The default entry forwards provider API keys (e.g. OPENAI_API_KEY) from
  # secret.data to the proxy. If you change the Helm release name or set
  # fullnameOverride, update the first entry to match: <fullname>-litellm-env.
  environmentSecrets:
    - kubeclaw-litellm-env
  # - my-extra-llm-keys

  # Disable the database migration job (no PostgreSQL by default).
  migrationJob:
    enabled: false

  # LiteLLM proxy configuration. Maps 1:1 to the upstream config.yaml format.
  # See https://docs.litellm.ai/docs/proxy/configs for full reference.
  proxy_config:
    model_list:
      - model_name: "gpt-4o"
        litellm_params:
          model: "gpt-4o"
          api_key: "os.environ/OPENAI_API_KEY"
      # Add more models as needed:
      # - model_name: "claude-opus-4-6"
      #   litellm_params:
      #     model: "claude-opus-4-6"
      #     api_key: "os.environ/ANTHROPIC_API_KEY"

    litellm_settings:
      drop_params: true

    router_settings:
      routing_strategy: "simple-shuffle"
      num_retries: 2
      timeout: 120

    general_settings:
      master_key: "os.environ/PROXY_MASTER_KEY"

    # Guardrails example (requires guardrails provider configured in litellm_settings):
    # guardrails:
    #   - guardrail_name: "bedrock-guardrails"
    #     litellm_params:
    #       guardrailIdentifier: "...arn..."
    #       guardrailVersion: "DRAFT"
    #     on_success: pass
    #     on_failure: block

    # Semantic caching example (requires litellm.redis.enabled=true):
    # cache:
    #   type: redis
    #   similarity_threshold: 0.8

  # PostgreSQL subchart toggle. Set deployStandalone=false to avoid creating a
  # PostgreSQL pod when you do not need virtual keys / budget tracking.
  db:
    deployStandalone: false

  # Redis subchart toggle. Enable for semantic caching.
  redis:
    enabled: true
    # Bitnami no longer publishes semver tags; only "latest" exists.
    # Pin by digest so kube-linter does not reject the image.
    image:
      digest: "sha256:5179ef5fcc0aee9b3a16e8030ea7b1a81f94033c06e1676c0c4b18c237de2e82"

  # Security context for the LiteLLM proxy container.
  # readOnlyRootFilesystem=true is safe: the upstream chart detects this flag
  # and automatically mounts emptyDir volumes for /tmp, /.cache, and /.npm so
  # prisma and other tools can still write at runtime.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

  # Resources for the LiteLLM proxy container.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Number of LiteLLM proxy replicas.
  replicaCount: 1

# ------------------------------------------------------------------------------
# Pod runtime class (exec isolation).
# Set to the name of an existing RuntimeClass for gVisor ("gvisor") or
# Kata Containers ("kata-containers"). Empty = cluster default runtime.
# RuntimeClass must exist cluster-side; this chart does not install runtimes.
# ------------------------------------------------------------------------------
pod:
  runtimeClassName: ""
  # Extra annotations for the Gateway pod.
  annotations: {}
  # Extra labels for the Gateway pod.
  labels: {}
  # Node selector.
  nodeSelector: {}
  # Tolerations.
  tolerations: []
  # Affinity rules.
  affinity: {}

# ------------------------------------------------------------------------------
# Service Account
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ------------------------------------------------------------------------------
# Name overrides
# ------------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""
