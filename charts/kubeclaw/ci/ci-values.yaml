# Minimal values for CI install tests.
# Provides just enough config for the Gateway to start without interactive setup.
secret:
  create: true
  data:
    OPENCLAW_GATEWAY_TOKEN: ci-test-token

config:
  mode: merge
  desired: |
    {
      gateway: { mode: "local" }
    }

litellm:
  masterkey: sk-ci-test-key

tailscale:
  ssh:
    authKey: tskey-auth-example
