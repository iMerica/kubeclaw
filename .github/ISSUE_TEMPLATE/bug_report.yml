name: Bug report
description: Report a reproducible problem in KubeClaw.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please keep details concise and reproducible.

  - type: input
    id: chart_version
    attributes:
      label: Chart version
      placeholder: 0.x.y
    validations:
      required: true

  - type: input
    id: k8s_version
    attributes:
      label: Kubernetes version
      placeholder: v1.29.x
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/events
      description: Paste key logs/events. Redact secrets.
      render: shell

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocks production
        - Degrades production
        - Dev/test only
    validations:
      required: true
