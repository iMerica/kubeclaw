name: Build KubeClaw Image

on:
  push:
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set image metadata
        id: meta
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image=ghcr.io/${owner_lc}/kubeclaw" >> "$GITHUB_OUTPUT"
          echo "tag=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: images/kubeclaw/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Print Helm image override snippet
        run: |
          echo "Built image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo
          echo "Use this with Helm:"
          echo "  --set image.repository=${{ steps.meta.outputs.image }}"
          echo "  --set image.tag=${{ steps.meta.outputs.tag }}"
          echo "  --set image.digest=${{ steps.build.outputs.digest }}"

      - name: Pin image to chart values
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          image_tag = os.environ["IMAGE_TAG"]
          image_digest = os.environ["IMAGE_DIGEST"]

          values_path = Path("charts/kubeclaw/values.yaml")
          values_text = values_path.read_text()
          updated_values, tag_updates = re.subn(
              r'^  tag:\s*".*"$',
              f'  tag: "{image_tag}"',
              values_text,
              count=1,
              flags=re.MULTILINE,
          )
          updated_values, digest_updates = re.subn(
              r'^  digest:\s*".*"$',
              f'  digest: "{image_digest}"',
              updated_values,
              count=1,
              flags=re.MULTILINE,
          )
          if tag_updates == 0 or digest_updates == 0:
              raise SystemExit("failed to update image tag/digest in charts/kubeclaw/values.yaml")
          if updated_values != values_text:
              values_path.write_text(updated_values)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/kubeclaw/values.yaml
          if git diff --cached --quiet; then
            echo "values.yaml already pinned — nothing to commit"
            exit 0
          fi
          git commit -m "chore: pin image to ${{ steps.meta.outputs.tag }} [skip ci]"
          # Rebase onto the latest master in case it moved during the build,
          # then push. Either default branch name works (main or master).
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git pull --rebase origin "${DEFAULT_BRANCH}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
