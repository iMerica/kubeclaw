name: Build KubeClaw Image

on:
  push:
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set image metadata
        id: meta
        run: |
          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image=ghcr.io/${owner_lc}/kubeclaw" >> "$GITHUB_OUTPUT"
          echo "tag=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: images/kubeclaw/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Print Helm image override snippet
        run: |
          echo "Built image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo
          echo "Use this with Helm:"
          echo "  --set image.repository=${{ steps.meta.outputs.image }}"
          echo "  --set image.tag=${{ steps.meta.outputs.tag }}"
          echo "  --set image.digest=${{ steps.build.outputs.digest }}"
