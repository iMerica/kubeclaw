name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          mapfile -t files < <(git ls-files '*.sh' '*.bash')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell files found"
            exit 0
          fi
          shellcheck -x "${files[@]}"
