name: Lint and Test Charts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint openclaw chart
        run: helm lint charts/openclaw

      - name: Lint openclaw-ultra chart
        run: helm lint charts/openclaw-ultra || true  # ultra may have unresolvable deps in CI

      - name: Run ct lint (changed charts only)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Validate JSON schema — replicaCount must be 1
        run: |
          echo "Testing that replicaCount=2 fails schema validation..."
          set +e
          output=$(helm template openclaw charts/openclaw \
            --set replicaCount=2 \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test \
            2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if echo "$output" | grep -qi "error\|invalid\|must\|const"; then
            echo "PASS: replicaCount=2 correctly rejected"
          else
            echo "FAIL: replicaCount=2 was not rejected by schema"
            exit 1
          fi

      - name: Dry-run render (default values)
        run: |
          helm template openclaw charts/openclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            > /tmp/openclaw-render.yaml
          echo "Rendered YAML:"
          cat /tmp/openclaw-render.yaml

  install:
    name: Install Test (kind)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kubeclaw-test

      - name: Run ct install (changed charts)
        run: |
          ct install \
            --config ct.yaml \
            --charts charts/openclaw \
            --helm-extra-set-args "--set secret.create=true --set secret.data.OPENCLAW_GATEWAY_TOKEN=ci-test-token"
