name: Lint and Test Charts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build chart dependencies
        run: helm dependency build charts/kubeclaw

      - name: Lint kubeclaw chart
        run: |
          helm lint charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example

      - name: Run ct lint (changed charts only)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Validate JSON schema — replicaCount must be 1
        run: |
          echo "Testing that replicaCount=2 fails schema validation..."
          set +e
          output=$(helm template openclaw charts/kubeclaw \
            --set replicaCount=2 \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if echo "$output" | grep -qi "error\|invalid\|must\|const"; then
            echo "PASS: replicaCount=2 correctly rejected"
          else
            echo "FAIL: replicaCount=2 was not rejected by schema"
            exit 1
          fi

      - name: Dry-run render (default values)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > /tmp/openclaw-render.yaml
          echo "Rendered YAML:"
          cat /tmp/openclaw-render.yaml

      - name: Lint kubeclaw chart (LiteLLM enabled)
        run: |
          helm lint charts/kubeclaw \
            --set litellm.enabled=true \
            --set litellm.masterkey=sk-test-key

      - name: Dry-run render (LiteLLM enabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.enabled=true \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > /tmp/openclaw-litellm-render.yaml
          echo "Rendered YAML (LiteLLM enabled):"
          cat /tmp/openclaw-litellm-render.yaml
          echo "Verifying OPENAI_API_BASE is present..."
          grep -q "OPENAI_API_BASE" /tmp/openclaw-litellm-render.yaml || \
            { echo "FAIL: OPENAI_API_BASE not found in rendered output"; exit 1; }
          echo "PASS: OPENAI_API_BASE found"

      - name: Dry-run render (egress filter enabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set egressFilter.enabled=true \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > /tmp/openclaw-egress-filter-render.yaml
          echo "Verifying dnsPolicy: None is present..."
          grep -q "dnsPolicy: None" /tmp/openclaw-egress-filter-render.yaml || \
            { echo "FAIL: dnsPolicy: None not found"; exit 1; }
          echo "PASS: dnsPolicy: None found"
          echo "Verifying egress-filter Deployment..."
          grep -q "egress-filter" /tmp/openclaw-egress-filter-render.yaml || \
            { echo "FAIL: egress-filter resources not found"; exit 1; }
          echo "PASS: egress-filter resources found"

      - name: Validate schema — litellm.enabled=true requires masterkey
        run: |
          echo "Testing that litellm.enabled=true without masterkey fails..."
          set +e
          output=$(helm template openclaw charts/kubeclaw \
            --set litellm.enabled=true \
            2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if echo "$output" | grep -qi "error\|invalid\|must\|anyOf"; then
            echo "PASS: missing masterkey correctly rejected"
          else
            echo "FAIL: missing masterkey was not rejected by schema"
            exit 1
          fi

  install:
    name: Install Test (kind)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: kubeclaw-test

      - name: Build chart dependencies
        run: helm dependency build charts/kubeclaw

      - name: Run ct install (changed charts)
        run: |
          ct install \
            --config ct.yaml \
            --charts charts/kubeclaw

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Build chart dependencies
        run: helm dependency build charts/kubeclaw

      - name: Render chart for scanning
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=scan-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > "$GITHUB_WORKSPACE/rendered.yaml"

      - name: Kubeconform — validate manifests against K8s schemas
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: >-
            -summary
            -strict
            -kubernetes-version 1.25.0
            -output text
            /github/workspace/rendered.yaml

      - name: Kube-linter — static analysis for best practices
        uses: stackrox/kube-linter-action@v1
        with:
          directory: "${{ github.workspace }}/rendered.yaml"

      - name: Trivy — scan for misconfigurations (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: charts/kubeclaw
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Set up Python (for Checkov)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkov — Helm chart policy scanning
        run: |
          pip install --quiet checkov
          checkov \
            --directory charts/kubeclaw \
            --framework helm \
            --quiet \
            --compact \
            --soft-fail
