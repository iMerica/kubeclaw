name: Lint and Test Charts

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-cli-tests:
    name: Go CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run CLI unit tests (pretty)
        run: make test-cli-pretty

  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "3.14.0"

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Validate SkillStack frontmatter
        run: bash ./scripts/validate-skill-frontmatter.sh

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Add Helm repos
        run: ./scripts/helm-repos.sh

      - name: Build chart dependencies
        run: helm dependency build charts/kubeclaw

      - name: Lint kubeclaw chart (default values)
        run: |
          helm lint charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example

      - name: Run ct lint (changed charts only)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Validate JSON schema — replicaCount must be 1
        run: |
          echo "Testing that replicaCount=2 fails schema validation..."
          set +e
          output=$(helm template openclaw charts/kubeclaw \
            --set replicaCount=2 \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if echo "$output" | grep -qi "error\|invalid\|must\|const"; then
            echo "PASS: replicaCount=2 correctly rejected"
          else
            echo "FAIL: replicaCount=2 was not rejected by schema"
            exit 1
          fi

      - name: Validate schema — litellm.enabled=true requires masterkey
        run: |
          echo "Testing that litellm.enabled=true without masterkey fails..."
          set +e
          output=$(helm template openclaw charts/kubeclaw \
            --set litellm.enabled=true \
            2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if echo "$output" | grep -qi "error\|invalid\|must\|anyOf"; then
            echo "PASS: missing masterkey correctly rejected"
          else
            echo "FAIL: missing masterkey was not rejected by schema"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Default render — all on-by-default features are active here:
      # chromium, egressFilter, litellm, tailscale.expose, tailscale.ssh, observability
      # -----------------------------------------------------------------------
      - name: Dry-run render (default values)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > /tmp/openclaw-render.yaml
          echo "Verifying OPENAI_API_BASE is present (litellm on by default)..."
          grep -q "OPENAI_API_BASE" /tmp/openclaw-render.yaml || \
            { echo "FAIL: OPENAI_API_BASE not found"; exit 1; }
          echo "PASS: OPENAI_API_BASE found"
          echo "Verifying dns-init initContainer present (egressFilter on by default)..."
          grep -q "name: dns-init" /tmp/openclaw-render.yaml || \
            { echo "FAIL: dns-init initContainer not found"; exit 1; }
          echo "PASS: dns-init initContainer found"
          echo "Verifying egress-filter resources present (egressFilter on by default)..."
          grep -q "egress-filter" /tmp/openclaw-render.yaml || \
            { echo "FAIL: egress-filter resources not found"; exit 1; }
          echo "PASS: egress-filter resources found"
          echo "Verifying Chromium Deployment present (chromium on by default)..."
          grep -q "app.kubernetes.io/component: chromium" /tmp/openclaw-render.yaml || \
            { echo "FAIL: Chromium resources not found"; exit 1; }
          echo "PASS: Chromium resources found"
          echo "Verifying Tailscale sidecar present (tailscale.ssh on by default)..."
          grep -q "name: tailscale" /tmp/openclaw-render.yaml || \
            { echo "FAIL: Tailscale sidecar not found"; exit 1; }
          echo "PASS: Tailscale sidecar found"
          echo "Verifying OTel resources present (observability on by default)..."
          grep -q "otel-node" /tmp/openclaw-render.yaml || \
            { echo "FAIL: OTel Node Collector not found"; exit 1; }
          echo "PASS: OTel Node Collector found"
          grep -q "otel-cluster" /tmp/openclaw-render.yaml || \
            { echo "FAIL: OTel Cluster Collector not found"; exit 1; }
          echo "PASS: OTel Cluster Collector found"
          grep -q "OTEL_EXPORTER_OTLP_ENDPOINT" /tmp/openclaw-render.yaml || \
            { echo "FAIL: OTEL_EXPORTER_OTLP_ENDPOINT not found"; exit 1; }
          echo "PASS: OTEL_EXPORTER_OTLP_ENDPOINT found"

      # -----------------------------------------------------------------------
      # Disabled-state renders — verify on-by-default features can be turned off
      # -----------------------------------------------------------------------
      - name: Dry-run render (litellm disabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.enabled=false \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > /tmp/openclaw-no-litellm.yaml
          echo "Verifying OPENAI_API_BASE is absent when litellm disabled..."
          ! grep -q "OPENAI_API_BASE" /tmp/openclaw-no-litellm.yaml || \
            { echo "FAIL: OPENAI_API_BASE present when litellm is disabled"; exit 1; }
          echo "PASS: OPENAI_API_BASE absent"
          echo "Verifying no LiteLLM subchart Deployment rendered..."
          ! grep -q "app.kubernetes.io/name: litellm" /tmp/openclaw-no-litellm.yaml || \
            { echo "FAIL: LiteLLM Deployment present when disabled"; exit 1; }
          echo "PASS: No LiteLLM Deployment"

      - name: Dry-run render (egressFilter disabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            --set egressFilter.enabled=false \
            > /tmp/openclaw-no-egress.yaml
          echo "Verifying dns-init initContainer absent when egressFilter disabled..."
          ! grep -q "name: dns-init" /tmp/openclaw-no-egress.yaml || \
            { echo "FAIL: dns-init initContainer present when egressFilter disabled"; exit 1; }
          echo "PASS: dns-init initContainer absent"
          echo "Verifying egress-filter resources absent..."
          ! grep -q "egress-filter" /tmp/openclaw-no-egress.yaml || \
            { echo "FAIL: egress-filter resources present when disabled"; exit 1; }
          echo "PASS: egress-filter resources absent"

      - name: Dry-run render (chromium disabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            --set chromium.enabled=false \
            > /tmp/openclaw-no-chromium.yaml
          echo "Verifying Chromium resources absent when chromium disabled..."
          ! grep -q "app.kubernetes.io/component: chromium" /tmp/openclaw-no-chromium.yaml || \
            { echo "FAIL: Chromium resources present when disabled"; exit 1; }
          echo "PASS: Chromium resources absent"

      - name: Dry-run render (tailscale.ssh disabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.enabled=false \
            > /tmp/openclaw-no-ts-ssh.yaml
          echo "Verifying Tailscale sidecar absent when tailscale.ssh disabled..."
          ! grep -q "name: tailscale" /tmp/openclaw-no-ts-ssh.yaml || \
            { echo "FAIL: Tailscale sidecar present when disabled"; exit 1; }
          echo "PASS: Tailscale sidecar absent"

      # -----------------------------------------------------------------------
      # Observability renders
      # -----------------------------------------------------------------------
      - name: Dry-run render (observability disabled)
        run: |
          helm template openclaw charts/kubeclaw \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=test-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            --set observability.enabled=false \
            > /tmp/openclaw-no-o11y.yaml
          echo "Verifying no OTel resources when observability disabled..."
          ! grep -q "otel-node\|otel-cluster\|OTEL_EXPORTER_OTLP_ENDPOINT" /tmp/openclaw-no-o11y.yaml || \
            { echo "FAIL: OTel resources leaked when observability disabled"; exit 1; }
          echo "PASS: No OTel resources leaked"

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "3.14.0"

      - name: Add Helm repos
        run: ./scripts/helm-repos.sh

      - name: Build chart dependencies
        run: helm dependency build charts/kubeclaw

      - name: Render chart for scanning
        run: |
          # --skip-tests omits Helm test hook Pods (e.g. litellm-test-connection)
          # from the rendered output. Those upstream Pods use plain "busybox" with
          # no securityContext or resource limits and would otherwise generate
          # false-positive kube-linter errors that we cannot fix upstream.
          helm template openclaw charts/kubeclaw \
            --skip-tests \
            --set secret.create=true \
            --set secret.data.OPENCLAW_GATEWAY_TOKEN=scan-token \
            --set litellm.masterkey=sk-test-key \
            --set tailscale.ssh.authKey=tskey-auth-example \
            > "$GITHUB_WORKSPACE/rendered.yaml"

      - name: Kubeconform — validate manifests against K8s schemas
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: >-
            -summary
            -strict
            -kubernetes-version 1.25.0
            -schema-location default
            -schema-location https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json
            -output text
            /github/workspace/rendered.yaml

      - name: Kube-linter — static analysis for best practices
        uses: stackrox/kube-linter-action@v1
        with:
          directory: "${{ github.workspace }}/rendered.yaml"
          config: "${{ github.workspace }}/.kube-linter.yaml"

      - name: Trivy — scan for misconfigurations (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: charts/kubeclaw
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Set up Python (for Checkov)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Checkov — Helm chart policy scanning
        run: |
          pip install --quiet checkov
          checkov \
            --directory charts/kubeclaw \
            --framework helm \
            --quiet \
            --compact \
            --soft-fail
