name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Normalize CLI tags for GoReleaser
        run: |
          current_cli_tag="${GITHUB_REF_NAME}"
          current_version="${current_cli_tag#cli-v}"
          current_tag="v${current_version}-cli.0"

          git tag "$current_tag" "$current_cli_tag^{commit}"

          previous_cli_tag="$(git tag --sort=-v:refname --list 'cli-v*' | awk -v current="$current_cli_tag" '$0 != current { print; exit }')"

          echo "GORELEASER_CURRENT_TAG=$current_tag" >> "$GITHUB_ENV"
          if [ -n "$previous_cli_tag" ]; then
            previous_version="${previous_cli_tag#cli-v}"
            previous_tag="v${previous_version}-cli.0"
            git tag "$previous_tag" "$previous_cli_tag^{commit}"
            echo "GORELEASER_PREVIOUS_TAG=$previous_tag" >> "$GITHUB_ENV"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.GORELEASER_CURRENT_TAG }}
          GORELEASER_PREVIOUS_TAG: ${{ env.GORELEASER_PREVIOUS_TAG }}
